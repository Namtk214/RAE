# ─────────────────────────────────────────────────────────────────
# Stage-2 Training — CelebAHQ256 + DiTDH-S + DINOv2-B
# ─────────────────────────────────────────────────────────────────
# CelebAHQ: ~30k face images, unconditional generation
# Uses TFDS builder at tfds_builders/celebahq256

stage_1:
  target: stage1.RAE
  params:
    encoder_cls: 'Dinov2withNorm'
    encoder_config_path: 'facebook/dinov2-with-registers-base'
    encoder_input_size: 224
    encoder_params:
      dinov2_path: 'facebook/dinov2-with-registers-base'
      normalize: true
    decoder_config_path: 'configs/decoder/ViTXL'
    pretrained_decoder_path: 'models/decoders/dinov2/wReg_base/ViTXL_n08/model.pt'
    noise_tau: 0.0
    reshape_to_2d: true
    normalization_stat_path: 'models/stats/dinov2/wReg_base/celebahq256/stat.pt'

stage_2:
  target: stage2.models.DDT.DiTwDDTHead
  params:
    input_size: 16
    patch_size: 1
    in_channels: 768
    hidden_size: [384, 2048]
    depth: [12, 2]
    num_heads: [6, 16]
    mlp_ratio: 4.0
    class_dropout_prob: 1.0    # unconditional generation
    num_classes: 1
    use_qknorm: false
    use_swiglu: true
    use_rope: true
    use_rmsnorm: true
    wo_shift: false
    use_pos_embed: true

transport:
  params:
    path_type: 'Linear'
    prediction: 'velocity'
    loss_weight: null
    time_dist_type: 'logit-normal_0_1'

sampler:
  mode: ODE
  params:
    sampling_method: 'euler'
    num_steps: 50
    atol: 1.0e-6
    rtol: 1.0e-3
    reverse: false

guidance:
  method: 'cfg'
  scale: 1.0          # no guidance for unconditional
  t_min: 0.0
  t_max: 1.0

misc:
  latent_size: [768, 16, 16]
  num_classes: 1
  time_dist_shift_dim: 196608
  time_dist_shift_base: 4096

# ── Data — TFDS celebahq256 ──
data:
  source: tfds
  dataset_name: celebahq256
  tfds_builder_dir: null   # set via CLI --tfds-builder-dir or override here

eval:
  eval_interval: 5000
  eval_model: true
  data_path: null
  reference_npz_path: null

training:
  epochs: 3000
  global_batch_size: 256
  grad_accum_steps: 1
  ema_decay: 0.9995
  num_workers: 8
  log_interval: 50
  checkpoint_interval: 50
  sample_every: 1000
  clip_grad: 1.0
  global_seed: 42
  optimizer:
    lr: 2.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.0
  scheduler:
    type: linear
    warmup_epochs: 100
    decay_end_epoch: 2000
    base_lr: 2.0e-4
    final_lr: 2.0e-5
    warmup_from_zero: false
