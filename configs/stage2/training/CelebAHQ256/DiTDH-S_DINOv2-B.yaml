stage_1:
  target: stage1.RAE
  params:
    encoder_cls: 'Dinov2withNorm'
    encoder_config_path: 'facebook/dinov2-base'
    encoder_input_size: 224
    encoder_params:
      dinov2_path: 'facebook/dinov2-base'
      normalize: true
    decoder_config_path: 'configs/decoder/ViTXL'
    noise_tau: 0.0
    reshape_to_2d: true

stage_2:
  target: stage2.models.DDT.DiTwDDTHead
  params:
    input_size: 16
    patch_size: 1
    in_channels: 768
    hidden_size: [384, 2048]
    depth: [12, 2]
    num_heads: [6, 16]
    mlp_ratio: 4.0
    class_dropout_prob: 0.0
    num_classes: 1
    use_qknorm: false
    use_swiglu: true
    use_rope: true
    use_rmsnorm: true
    wo_shift: false
    use_pos_embed: true

transport:
  params:
    path_type: 'Linear'
    prediction: 'velocity'
    loss_weight: null
    time_dist_type: 'logit-normal_0_1'

sampler:
  mode: ODE
  params:
    sampling_method: 'euler'
    num_steps: 50
    atol: 1.0e-6
    rtol: 1.0e-3
    reverse: false

guidance:
  method: 'cfg'
  scale: 1.0
  t_min: 0.0
  t_max: 1.0

misc:
  latent_size: [768, 16, 16]
  num_classes: 1
  time_dist_shift_dim: 196608
  time_dist_shift_base: 4096

data:
  source: 'tfds'
  dataset_name: 'celebahq256'
  data_dir: '/home/ngothanhnam508/tensorflow_datasets'
  tfds_builder_dir: '/home/ngothanhnam508/tensorflow_datasets/celebahq256/1.0.0'
  image_size: 256
  num_train_samples: 30000

training:
  epochs: 200
  global_batch_size: 128
  ema_decay: 0.9995
  num_workers: 8
  log_interval: 50
  checkpoint_interval: 10
  sample_every: 500
  clip_grad: 1.0
  global_seed: 42
  optimizer:
    lr: 2.0e-4
    betas: [0.9, 0.95]
    weight_decay: 0.0
  scheduler:
    type: linear
    warmup_epochs: 10
    decay_end_epoch: 200
    base_lr: 2.0e-4
    final_lr: 2.0e-5
    warmup_from_zero: false
